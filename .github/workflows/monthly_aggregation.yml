name: monthly_aggregation

env:
    NEON_DBNAME: ${{ secrets.NEON_DBNAME }}
    NEON_HOST: ${{ secrets.NEON_HOST }}
    NEON_USER: ${{ secrets.NEON_USER }}
    NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}

on:
  schedule:
    - cron: "0 6 1 * *"   # 1st of each month at 06:00 UTC
  workflow_dispatch:       # allows manual trigger

jobs:
  aggregate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libpq-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("DBI", "RPostgres", "dplyr"), repos="https://cloud.r-project.org")'

      - name: Run monthly aggregation
        run: |
          Rscript code/aggregate/run_monthly_aggregation.R
