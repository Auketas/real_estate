name: Analyze High-Impact Unmatched Neighbourhoods

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install dependencies
        run: |
          install.packages(c('DBI', 'RPostgres', 'jsonlite', 'dplyr'))
        shell: Rscript {0}

      - name: Analyze impact
        env:
          NEON_DBNAME: ${{ secrets.NEON_DBNAME }}
          NEON_HOST: ${{ secrets.NEON_HOST }}
          NEON_USER: ${{ secrets.NEON_USER }}
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: Rscript code/scripts/find_high_impact_unmatched.R
