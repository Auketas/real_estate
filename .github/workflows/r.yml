name: run_imovirtual_scraper

env:
    TURSO_URL: ${{ secrets.TURSO_URL }}
    TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
    NEON_DBNAME: ${{ secrets.NEON_DBNAME }}
    NEON_HOST: ${{ secrets.NEON_HOST }}
    NEON_USER: ${{ secrets.NEON_USER }}
    NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}

on:
  schedule:
    - cron: "0 6 * * *"   # runs every day at 06:00 UTC
  workflow_dispatch:      # allows manual trigger too

jobs:
  run-r:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install dependencies
        run: |
          Rscript -e 'install.packages(c("RPostgres","httr","rvest","assertthat","jsonlite","stringr","dplyr","tidygeocoder","DBI","RSQLite","httr2"), repos="https://cloud.r-project.org")'

      - name: Run R script
        run: |
          Rscript code/scrape/run_imovirtual_scraper.R
