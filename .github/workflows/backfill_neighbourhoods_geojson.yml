name: Backfill Missing Neighbourhoods from GeoJSON

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudunits2-dev libgdal-dev libproj-dev

      - name: Install R dependencies
        run: |
          install.packages(c('DBI', 'RPostgres', 'sf', 'dplyr'))
        shell: Rscript {0}

      - name: Backfill neighbourhoods from GeoJSON
        env:
          NEON_DBNAME: ${{ secrets.NEON_DBNAME }}
          NEON_HOST: ${{ secrets.NEON_HOST }}
          NEON_USER: ${{ secrets.NEON_USER }}
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: Rscript code/scripts/backfill_neighbourhoods_from_geojson.R
