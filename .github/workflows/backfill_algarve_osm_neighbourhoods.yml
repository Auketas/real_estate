name: Backfill Algarve OSM Neighbourhoods

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no database updates)'
        required: false
        default: false
        type: boolean

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev libssl-dev libcurl4-openssl-dev

      - name: Install R dependencies
        run: |
          Rscript -e "install.packages(c('DBI', 'RPostgres', 'tidygeocoder', 'dplyr'), repos='http://cran.r-project.org')"

      - name: Run Algarve OSM neighbourhood backfill
        env:
          NEON_DBNAME: ${{ secrets.NEON_DBNAME }}
          NEON_HOST: ${{ secrets.NEON_HOST }}
          NEON_USER: ${{ secrets.NEON_USER }}
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: |
          Rscript code/scrape/backfill_algarve_osm_neighbourhoods.R

      - name: Commit results
        if: success()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add log/
          git diff-index --quiet HEAD || git commit -m "Log: Algarve OSM neighbourhood backfill results"
          git push || true
