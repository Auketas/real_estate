name: Backfill Neighbourhoods (Spatial Join)

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libgdal-dev libproj-dev libgeos-dev libudunits2-dev udunits2

      - name: Install R packages
        run: |
          options(repos = c(r4geo = 'https://r4geo.r-universe.dev', CRAN = 'https://cloud.r-project.org'))
          install.packages(c('DBI', 'RPostgres', 'sf', 'dplyr'))
        shell: Rscript {0}

      - name: Backfill neighbourhoods via spatial join
        env:
          NEON_DBNAME: ${{ secrets.NEON_DBNAME }}
          NEON_HOST: ${{ secrets.NEON_HOST }}
          NEON_USER: ${{ secrets.NEON_USER }}
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: Rscript code/scripts/backfill_neighbourhoods_spatial_join.R
