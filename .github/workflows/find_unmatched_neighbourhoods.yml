name: Find Unmatched Neighbourhoods

on:
  workflow_dispatch:

jobs:
  find-unmatched:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Find all unmatched neighbourhoods
        env:
          NEON_DBNAME: ${{ secrets.NEON_DBNAME }}
          NEON_HOST: ${{ secrets.NEON_HOST }}
          NEON_USER: ${{ secrets.NEON_USER }}
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
        run: python find_unmatched_neighbourhoods.py
